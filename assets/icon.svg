<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="Soirée">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff4d6d"/>
      <stop offset="1" stop-color="#4dd0e1"/>
    </linearGradient>
  </defs>
  <!-- Fond pleine surface (compatible icônes maskables). -->
  <rect width="512" height="512" fill="#0f0f1a"/>
  <rect width="512" height="512" fill="url(#bg)" opacity="0.9"/>
  <!-- Verre à cocktail (blanc), centré dans la zone sûre. -->
  <g fill="#ffffff">
    <polygon points="156,168 356,168 256,300"/>
    <rect x="249" y="292" width="14" height="86" rx="4"/>
    <rect x="196" y="372" width="120" height="16" rx="8"/>
  </g>
  <!-- Olive -->
  <circle cx="256" cy="232" r="16" fill="#ffd43b"/>
  <line x1="256" y1="232" x2="330" y2="150" stroke="#ffd43b" stroke-width="6" stroke-linecap="round"/>
</svg>
